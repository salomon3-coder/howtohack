name: Daily Content Generator

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate daily posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          POSTS_PER_RUN: ${{ vars.POSTS_PER_RUN }}
        run: npm run generate:posts

      - name: Verify site build (catch broken frontmatter before push)
        run: npm run build

      - name: Commit and push new content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/blog
          if git diff --staged --quiet; then
            echo "No content changes to commit."
            exit 0
          fi
          git commit -m "chore(content): publish daily generated posts"
          git push
